<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alison & Javier - Nuestra Boda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            'primary-text': 'var(--color-primary-text)',
            bg: 'var(--color-bg)',
            surface: 'var(--color-surface)',
            base: 'var(--color-text)'
          }
        }
      }
    }
  </script>
  <style>
    .font-script {
      font-family: var(--font-script, 'Great Vibes'), cursive;
    }

    .font-serif {
      font-family: var(--font-serif, 'Playfair Display'), serif;
    }

    .font-sans {
      font-family: var(--font-sans, 'Montserrat'), sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--color-bg, #fdfcfb);
      color: var(--color-text, #4a4a4a);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #8fa189;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
